<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify OTP - CodeWithJalandhar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div class="card p-4" style="max-width: 400px; width: 100%;">
    <h3 class="mb-4 text-center">Verify OTP</h3>
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <label for="otp" class="form-label">Enter the OTP sent to your email</label>
        <input type="text" name="otp" id="otp" required class="form-control" maxlength="6" placeholder="6-digit OTP" />
      </div>
      <button type="submit" class="btn btn-primary w-100">Verify OTP</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
